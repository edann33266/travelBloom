<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Travel Bloom | Contact Us</title>

    <link
        rel="stylesheet"
        href="./travelBloom.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav>

        <div class="branding">

            <img
                src="https://i.pinimg.com/1200x/d4/be/d2/d4bed22d6ef3246c62278fac9343ba6e.jpg"
                alt="Travel Bloom Logo">

            <h1>
                <i>Travel Bloom</i>
            </h1>

        </div>

        <ul>

            <li>
                <a href="./index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="./about_us.html">
                    About Us
                </a>
            </li>

            <li>
                <a href="./contact_us.html"
                   class="active-link">
                    Contact Us
                </a>
            </li>

            <li>
                <input
                    type="text"
                    id="conditionInput"
                    placeholder="Enter destination or keyword">
            </li>

            <li>
                <button id="btnSearch">
                    Search
                </button>
            </li>

            <li>
                <button id="clear">
                    Clear
                </button>
            </li>

        </ul>

    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact1">

        <div class="contact1-content">

            <h1>
                Contact Us
            </h1>

            <p>
                We'd love to hear from you.
                Share feedback, questions,
                or suggestions about TravelBloom.
            </p>

            <form action="#"
                  method="post">

                <label for="name">
                    Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required>

                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

                <label for="message">
                    Message
                </label>

                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    placeholder="Write your message here..."
                    required>
                </textarea>

                <button
                    type="submit"
                    class="contact1-btn">

                    Send Message

                </button>

            </form>

        </div>

    </section>

</body>

</html>
